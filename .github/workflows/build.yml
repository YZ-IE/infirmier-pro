name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── Cache npm ────────────────────────────────────────────────────────────
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-

      # ── Cache Gradle ─────────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── Build JS ─────────────────────────────────────────────────────────────
      - name: Install deps and build
        run: npm install --legacy-peer-deps && npm run build

      - name: Sync Android
        run: npx cap sync android

      - name: Update Gradle wrapper
        run: cd android && ./gradlew wrapper --gradle-version=8.9 --distribution-type=bin

      # ── Keystore fixe (signature stable = mise à jour directe possible) ──────
      - name: Restore debug keystore
        env:
          DEBUG_KEYSTORE_B64: ${{ secrets.DEBUG_KEYSTORE_B64 }}
        run: |
          echo "$DEBUG_KEYSTORE_B64" | base64 -d > android/app/debug.keystore

      # ── Build APK ────────────────────────────────────────────────────────────
      - name: Build APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: InfirmierPro.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
